<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orlando Theme Park Wait Times</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --text-color: #f5f5f7;
            --accent-color: #0071e3;
            --disney-color: #00bcd4;
            --universal-color: #ff9800;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Swipe Container using CSS Scroll Snapping */
        .swiper-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            flex-grow: 1;
            -webkit-overflow-scrolling: touch;
        }

        /* Hide Scrollbar */
        .swiper-container::-webkit-scrollbar {
            display: none;
        }
        .swiper-container {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Individual Park Page */
        .park-page {
            flex: 0 0 100%;
            width: 100%;
            height: 100%;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
        }

        /* Sticky Header Mask Layer */
        .park-header {
            text-align: center;
            padding: 20px 0 15px 0;
            border-bottom: 2px solid;
            background-color: var(--bg-color);
            position: sticky;
            top: 0;
            z-index: 10;
            width: 100%;
        }

        .disney-park { border-color: var(--disney-color); }
        .universal-park { border-color: var(--universal-color); }

        .park-title {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .park-brand {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-top: 4px;
            margin-bottom: 12px;
        }

        /* Nav Dots Area inside each Park Header */
        .nav-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #444;
            transition: background-color 0.3s, transform 0.3s;
        }

        .dot.active {
            background-color: var(--accent-color);
            transform: scale(1.2);
        }

        /* Ride List Layout */
        .ride-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            padding: 10px 20px 40px 20px;
        }

        .ride-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .ride-info {
            flex-grow: 1;
            padding-right: 15px;
        }

        .ride-name {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .ride-status {
            font-size: 0.8rem;
            opacity: 0.6;
        }

        .ride-wait {
            font-size: 1.4rem;
            font-weight: 700;
            min-width: 70px;
            text-align: right;
            color: #4cd964;
        }

        .ride-wait.moderate { color: #ffcc00; }
        .ride-wait.high { color: #ff3b30; }
        .ride-wait.closed { color: #8e8e93; font-size: 1rem; }

        /* Loading & Error States */
        .status-msg {
            text-align: center;
            margin: 40px auto;
            font-style: italic;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="swiper-container" id="swiperContainer"></div>

    <script>
        const parkIds = [
            { name: "MAGIC KINGDOM", id: "75ea578a-adc8-4116-a54d-dccb60765ef9", brand: "Disney" },
            { name: "EPCOT", id: "47f90d2c-e191-4239-a466-5892ef59a88b", brand: "Disney" },
            { name: "HOLLYWOOD STUDIOS", id: "288747d1-8b4f-4a64-867e-ea7c9b27bad8", brand: "Disney" },
            { name: "ANIMAL KINGDOM", id: "1c84a229-8862-4648-9c71-378ddd2c7693", brand: "Disney" },
            { name: "UNIVERSAL STUDIOS FLORIDA", id: "eb3f4560-2383-4a36-9152-6b3e5ed6bc57", brand: "Universal" },
            { name: "ISLANDS OF ADVENTURE", id: "267615cc-8943-4c2a-ae2c-5da728ca591f", brand: "Universal" },
            { name: "EPIC UNIVERSE", id: "12dbb85b-265f-44e6-bccf-f1faa17211fc", brand: "Universal" }
        ];

        const container = document.getElementById('swiperContainer');
        let isHandlingJump = false;

        function generateDotsMarkup(activeIndex) {
            return parkIds.map((_, idx) => 
                `<div class="dot ${idx === activeIndex ? 'active' : ''}"></div>`
            ).join('');
        }

        function cleanRideName(name) {
            return name
                .replace(/[\u2014\u2013-].*$/, '') 
                .replace(/\b(featuring|starring|presents|inspired by)\b.*/i, '') 
                .replace(/\b(The Ride|The Attraction|3D|4D)\b/gi, '') 
                .trim();
        }

        // Build HTML pages including cloned elements on both ends for seamless infinite scrolling
        function initApp() {
            // 1. Create a clone of the LAST element at the very beginning
            createPageElement(parkIds[parkIds.length - 1], parkIds.length - 1, 'clone-last');

            // 2. Create the normal original elements
            parkIds.forEach((park, index) => {
                createPageElement(park, index, `real-${index}`);
            });

            // 3. Create a clone of the FIRST element at the very end
            createPageElement(parkIds[0], 0, 'clone-first');

            // Initialize position centered over the first genuine panel (index 1)
            window.addEventListener('load', () => {
                const width = container.clientWidth;
                container.scrollLeft = width;
            });

            // Fetch live data once globally
            fetchAllParkTimes();
            scheduleTopOfTheMinuteRefresh();
        }

        function createPageElement(park, functionalIndex, identityClass) {
            const page = document.createElement('div');
            page.className = `park-page ${identityClass}`;
            
            const brandClass = park.brand.toLowerCase() === 'disney' ? 'disney-park' : 'universal-park';
            
            page.innerHTML = `
                <div class="park-header ${brandClass}">
                    <div class="park-title">${park.name}</div>
                    <div class="park-brand">${park.brand}</div>
                    <div class="nav-dots">
                        ${generateDotsMarkup(functionalIndex)}
                    </div>
                </div>
                <div class="ride-list" data-id="${park.id}">
                    <div class="status-msg">Loading live times...</div>
                </div>
            `;
            container.appendChild(page);
        }

        async function fetchAllParkTimes() {
            parkIds.forEach(park => fetchParkData(park.id));
        }

        async function fetchParkData(parkId) {
            // Select all lists matching this ID (updates clones and original structures simultaneously)
            const listElements = document.querySelectorAll(`.ride-list[data-id="${parkId}"]`);
            try {
                const response = await fetch(`https://api.themeparks.wiki/v1/entity/${parkId}/live`);
                if (!response.ok) throw new Error('Network error');
                
                const data = await response.json();
                
                const attractions = (data.liveData || []).filter(item => {
                    const isAttraction = item.entityType === "ATTRACTION";
                    const name = item.name.toLowerCase();
                    
                    if (name.includes('meet') || name.includes('greeting') || name.includes('character') || name.includes('at her') || name.includes('at his')) return false;
                    if (name.includes('show') || name.includes('spectacular') || name.includes('theater') || name.includes('parade') || name.includes('cinema') || name.includes('experience')) {
                        if (name.includes('3d') || name.includes('4d') || name.includes('ride')) return isAttraction;
                        return false;
                    }
                    if (name.includes('dining') || name.includes('restaurant') || name.includes('cafe')) return false;
                    
                    return isAttraction;
                });

                if (attractions.length === 0) {
                    listElements.forEach(el => el.innerHTML = `<div class="status-msg">No active rides found or park is closed.</div>`);
                    return;
                }

                attractions.sort((a, b) => {
                    const waitA = (a.queue && a.queue.STANDBY) ? (a.queue.STANDBY.waitTime || 0) : -1;
                    const waitB = (b.queue && b.queue.STANDBY) ? (b.queue.STANDBY.waitTime || 0) : -1;
                    
                    if (a.status !== "OPERATING" && b.status === "OPERATING") return 1;
                    if (a.status === "OPERATING" && b.status !== "OPERATING") return -1;
                    
                    return waitB - waitA;
                });

                const contentMarkup = attractions.map(ride => {
                    const isOpen = ride.status === "OPERATING";
                    const waitTime = (isOpen && ride.queue && ride.queue.STANDBY) ? ride.queue.STANDBY.waitTime : null;
                    
                    let waitDisplay = "CLOSED";
                    let colorClass = "closed";

                    if (isOpen) {
                        if (waitTime !== null) {
                            waitDisplay = `${waitTime} min`;
                            if (waitTime > 45) colorClass = "high";
                            else if (waitTime > 20) colorClass = "moderate";
                            else colorClass = "";
                        } else {
                            waitDisplay = "OPEN";
                            colorClass = "";
                        }
                    }

                    return `
                        <div class="ride-card">
                            <div class="ride-info">
                                <div class="ride-name">${cleanRideName(ride.name)}</div>
                                <div class="ride-status">${ride.status.replace('_', ' ')}</div>
                            </div>
                            <div class="ride-wait ${colorClass}">${waitDisplay}</div>
                        </div>
                    `;
                }).join('');

                listElements.forEach(el => el.innerHTML = contentMarkup);

            } catch (error) {
                console.error(`Error fetching data for ${parkId}:`, error);
            }
        }

        function scheduleTopOfTheMinuteRefresh() {
            const now = new Date();
            const msUntilNextMinute = (60 - now.getSeconds()) * 1000 - now.getMilliseconds();
            
            setTimeout(() => {
                fetchAllParkTimes();
                setInterval(fetchAllParkTimes, 60000);
            }, msUntilNextMinute);
        }

        // Detect container scroll to handle the index transitions and infinite loops
        container.addEventListener('scroll', () => {
            const width = container.clientWidth;
            if (width === 0) return;

            const scrollLeft = container.scrollLeft;
            const totalPanels = parkIds.length + 2; // original + 2 clones

            // 1. Core infinite wrap-around execution tracking
            if (!isHandlingJump) {
                if (scrollLeft <= 0) {
                    // Left extreme clone edge hit -> Teleport instantly back to the real final panel
                    isHandlingJump = true;
                    container.style.scrollBehavior = 'auto'; // Disable transitions temporarily
                    container.scrollLeft = width * parkIds.length;
                    isHandlingJump = false;
                    return;
                } else if (scrollLeft >= width * (totalPanels - 1)) {
                    // Right extreme clone edge hit -> Teleport instantly back to the real first panel
                    isHandlingJump = true;
                    container.style.scrollBehavior = 'auto';
                    container.scrollLeft = width;
                    isHandlingJump = false;
                    return;
                }
            }

            // Restore fluid scrolling for normal interactions
            container.style.scrollBehavior = 'smooth';

            // 2. Dynamically calculate which original dot must highlight
            const activeRawIndex = Math.round(scrollLeft / width);
            let mapToOriginalIndex = activeRawIndex - 1;

            if (mapToOriginalIndex < 0) mapToOriginalIndex = parkIds.length - 1;
            if (mapToOriginalIndex >= parkIds.length) mapToOriginalIndex = 0;

            // Re-render dots accurately on headers across all generated elements
            const allNavContainers = document.querySelectorAll('.nav-dots');
            allNavContainers.forEach(wrapper => {
                wrapper.innerHTML = generateDotsMarkup(mapToOriginalIndex);
            });
        });

        // Resize support to prevent alignment breaking if changing orientations
        window.addEventListener('resize', () => {
            const width = container.clientWidth;
            const activeRawIndex = Math.round(container.scrollLeft / width);
            container.style.scrollBehavior = 'auto';
            container.scrollLeft = activeRawIndex * width;
        });

        initApp();
    </script>
</body>
</html>
